name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:logic
      - run: npm run build

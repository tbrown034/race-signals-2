name: Daily FEC ingest

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      state:
        description: "Two-letter state code. Clear only for an intentional broader national sample."
        required: false
        default: "IN"
      offices:
        description: "FEC offices to ingest: H, S, or H,S."
        required: false
        default: "H,S"
      max_candidates:
        description: "Manual candidate cap. Keep bounded unless intentionally doing a long run."
        required: false
        default: "100"
      max_candidate_pages:
        description: "Manual candidate search page cap."
        required: false
        default: "5"

concurrency:
  group: fec-ingest
  cancel-in-progress: false

jobs:
  scheduled-ingest:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      RACE_SIGNALS_OFFICES: H,S
      RACE_SIGNALS_STATE: IN
      FEC_MAX_CANDIDATES: "25"
      FEC_MAX_CANDIDATE_PAGES: "2"
      FEC_REQUEST_DELAY_MS: "4000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run ingest
      - run: npm run repair:schedule-e-links
      - run: SIGNAL_AUDIT_STRICT=1 npm run audit:signals
      - run: npm run repair:history
      - run: npm run audit:cost

  manual-ingest:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      RACE_SIGNALS_OFFICES: ${{ inputs.offices }}
      RACE_SIGNALS_STATE: ${{ inputs.state }}
      FEC_MAX_CANDIDATES: ${{ inputs.max_candidates }}
      FEC_MAX_CANDIDATE_PAGES: ${{ inputs.max_candidate_pages }}
      FEC_REQUEST_DELAY_MS: "4000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run ingest
      - run: npm run repair:schedule-e-links
      - run: SIGNAL_AUDIT_STRICT=1 npm run audit:signals
      - run: npm run repair:history
      - run: npm run audit:cost
